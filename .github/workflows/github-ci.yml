name: Juice Shop CI/CD

on:
  push:
    branches:
      - master

env:
  IMAGE_NAME: nitinkdocker18/juice_shop
  IMAGE_TAG: juice-shop-1.1

jobs:
  cache:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Cache node_modules
        id: npm-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

      - name: Log Cache Status
        run: |
          echo "::group::Cache status"
          if [ "${{ steps.npm-cache.outputs.cache-hit }}" == "true" ]; then
            echo "✅ node_modules cache HIT — dependencies restored from cache"
          else
            echo "⚠️ node_modules cache MISS — dependencies will be installed"
          fi
          echo "::endgroup::"

      - name: Install Dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true' # only install when the lockfile changed
        run: |
          echo "📦 Installing dependencies with 'npm ci' on $GITHUB_REPOSITORY @ $GITHUB_SHA"
          echo "::group::npm ci output"
          npm ci
          echo "::endgroup::"
          echo "::notice title=Cache::Dependencies installed and cached"

  test:
    needs: [cache]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Restore node_modules
        id: npm-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install Dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true' # fallback when cache missed
        run: npm ci

      - name: Run Tests
        run: |
          echo "🧪 Starting test suite on $GITHUB_REPOSITORY @ $GITHUB_SHA"
          echo "::group::npm test output"
          set +e
          npm test
          status=$?
          set -e
          echo "::endgroup::"
          {
            echo "### 🧪 Test Suite"
            if [ "$status" -eq 0 ]; then
              echo "- Status: ✅ passed"
            else
              echo "- Status: ❌ failed"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          exit $status

  gitleaks:
    needs: [cache]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so Gitleaks can scan every commit, not just the latest

      - name: Run Gitleaks Secret Scan
        continue-on-error: true # report any leaks but don't fail the pipeline
        run: |
          echo "🔍 Starting Gitleaks secret scan on $GITHUB_REPOSITORY @ $GITHUB_SHA"
          echo "::group::Gitleaks output"
          set +e
          docker run --rm -v "${{ github.workspace }}:/path" zricethezav/gitleaks:latest detect \
            --source="/path" \
            --report-format json \
            --report-path "/path/gitleaks-report.json" \
            --verbose
          status=$?
          set -e
          echo "::endgroup::"
          findings="unknown"
          if [ -f gitleaks-report.json ]; then
            findings=$(grep -o '"RuleID"' gitleaks-report.json | wc -l | tr -d ' ')
          fi
          {
            echo "### 🔑 Gitleaks Secret Scan"
            echo "- Status: completed (exit $status)"
            echo "- Leaks found: $findings"
            echo "- Report: gitleaks-report.json"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$findings" != "0" ] && [ "$findings" != "unknown" ]; then
            echo "::warning title=Gitleaks::$findings potential secret(s) detected — see gitleaks-report artifact"
          else
            echo "::notice title=Gitleaks::Scan finished, report uploaded as artifact"
          fi

      - name: Upload Gitleaks Report
        if: always() # publish the report even when the scan step finds leaks
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          if-no-files-found: error # fail the step (and surface it) if the scan wrote no report

  njsscan:
    needs: [cache]
    runs-on: ubuntu-latest
    continue-on-error: true # job fails on findings but the pipeline keeps going

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Run njsscan SAST
        continue-on-error: true # surface findings but keep the job's later steps running
        run: |
          echo "🔍 Starting njsscan SAST on $GITHUB_REPOSITORY @ $GITHUB_SHA"
          echo "::group::njsscan output"
          set +e
          docker run --rm -v "${{ github.workspace }}:/src" opensecurity/njsscan:latest \
            --sarif -o /src/njsscan-report.sarif --exit-warning /src
          status=$?
          set -e
          echo "::endgroup::"
          findings="unknown"
          if [ -f njsscan-report.sarif ]; then
            findings=$(grep -o '"ruleId"' njsscan-report.sarif | wc -l | tr -d ' ')
          fi
          {
            echo "### 🛡️ njsscan SAST"
            echo "- Status: completed (exit $status)"
            echo "- Findings: $findings"
            echo "- Report: njsscan-report.sarif"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::notice title=njsscan::Scan finished ($findings findings), report uploaded as artifact"

      - name: Upload njsscan Report
        if: always() # publish the report even when the scan flags findings
        uses: actions/upload-artifact@v4
        with:
          name: njsscan-report
          path: njsscan-report.sarif
          if-no-files-found: error # fail the step (and surface it) if the scan wrote no report

  semgrep:
    needs: [cache]
    runs-on: ubuntu-latest
    continue-on-error: true # job fails on findings but the pipeline keeps going
    container:
      image: semgrep/semgrep:latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Run Semgrep SAST
        continue-on-error: true # surface findings but keep the job's later steps running
        run: |
          echo "🔍 Starting Semgrep SAST on $GITHUB_REPOSITORY @ $GITHUB_SHA"
          echo "::group::Semgrep output"
          set +e
          semgrep scan --config auto --json --output semgrep-report.json --error
          status=$?
          set -e
          echo "::endgroup::"
          findings="unknown"
          if [ -f semgrep-report.json ]; then
            findings=$(grep -o '"check_id"' semgrep-report.json | wc -l | tr -d ' ')
          fi
          {
            echo "### 🔎 Semgrep SAST"
            echo "- Status: completed (exit $status)"
            echo "- Findings: $findings"
            echo "- Report: semgrep-report.json"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::notice title=Semgrep::Scan finished ($findings findings), report uploaded as artifact"

      - name: Upload Semgrep Report
        if: always() # publish the report even when the scan flags findings
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep-report.json
          if-no-files-found: error # fail the step (and surface it) if the scan wrote no report

  retire:
    needs: [cache]
    runs-on: ubuntu-latest
    continue-on-error: true # job fails on findings but the pipeline keeps going

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Restore node_modules
        id: npm-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install Dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true' # fallback when cache missed
        run: npm ci

      - name: Run Retire.js SCA
        continue-on-error: true # surface vulnerable dependencies but keep later steps running
        run: |
          echo "🔍 Starting Retire.js SCA on $GITHUB_REPOSITORY @ $GITHUB_SHA"
          echo "::group::Retire.js setup"
          npm install -g retire
          echo "::endgroup::"
          echo "::group::Retire.js output"
          set +e
          retire --path . --outputformat json --outputpath retirejs-report.json --severity low
          status=$?
          set -e
          echo "::endgroup::"
          findings="unknown"
          if [ -f retirejs-report.json ]; then
            findings=$(grep -o '"component"' retirejs-report.json | wc -l | tr -d ' ')
          fi
          {
            echo "### 📦 Retire.js SCA"
            echo "- Status: completed (exit $status)"
            echo "- Vulnerable component hits: $findings"
            echo "- Report: retirejs-report.json"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$findings" != "0" ] && [ "$findings" != "unknown" ]; then
            echo "::warning title=Retire.js::$findings vulnerable dependency finding(s) — see retirejs-report artifact"
          else
            echo "::notice title=Retire.js::Scan finished, report uploaded as artifact"
          fi

      - name: Upload Retire.js Report
        if: always() # publish the report even when the scan flags vulnerable dependencies
        uses: actions/upload-artifact@v4
        with:
          name: retirejs-report
          path: retirejs-report.json
          if-no-files-found: error # fail the step (and surface it) if the scan wrote no report

  upload_report:
    needs: [test, gitleaks, njsscan, semgrep, retire]
    runs-on: ubuntu-latest
    continue-on-error: true # job fails on upload errors but the pipeline keeps going
    if: false # bypassed for now — skip importing reports into DefectDojo

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download Scan Reports
        uses: actions/download-artifact@v4
        with:
          path: reports # each artifact lands in reports/<artifact-name>/

      - name: Install requests
        run: pip install requests

      - name: Import Reports into DefectDojo
        env:
          DEFECTDOJO_URL: ${{ secrets.DEFECTDOJO_URL }} # e.g. https://demo.defectdojo.org
          DEFECTDOJO_API_KEY: ${{ secrets.DEFECTDOJO_API_KEY }}
          DEFECTDOJO_ENGAGEMENT_ID: ${{ secrets.DEFECTDOJO_ENGAGEMENT_ID }}
        run: python uploads-python.py

  build:
    needs: [test, gitleaks, njsscan, semgrep, retire] # upload_report is bypassed, so depend on the scan jobs directly
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Log Build Target
        run: |
          echo "::group::Build target"
          echo "🐳 Building image ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} from $GITHUB_REPOSITORY @ $GITHUB_SHA"
          echo "::endgroup::"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Log Build Result
        run: |
          {
            echo "### 🐳 Docker Build & Push"
            echo "- Image: \`${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}\`"
            echo "- Status: ✅ pushed to Docker Hub"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::notice title=Build::Pushed ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"

  trivy:
    needs: [build] # scan the image only after it has been built and pushed
    runs-on: ubuntu-latest
    continue-on-error: true # job fails on findings but the pipeline keeps going

    steps:
      - name: Run Trivy Image Scan
        continue-on-error: true # surface image vulnerabilities but keep later steps running
        run: |
          echo "🔍 Starting Trivy image scan of ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          echo "Severities: CRITICAL,HIGH,MEDIUM,LOW | Types: os,library"
          echo "::group::Trivy output"
          set +e
          docker run --rm -v "${{ github.workspace }}:/report" aquasec/trivy:latest image \
            --format json \
            --output /report/trivy-image-report.json \
            --severity CRITICAL,HIGH,MEDIUM,LOW \
            --vuln-type os,library \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          status=$?
          set -e
          echo "::endgroup::"
          findings="unknown"
          if [ -f trivy-image-report.json ]; then
            findings=$(grep -o '"VulnerabilityID"' trivy-image-report.json | wc -l | tr -d ' ')
          fi
          {
            echo "### 🐳 Trivy Image Scan"
            echo "- Image: \`${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}\`"
            echo "- Status: completed (exit $status)"
            echo "- Vulnerabilities found: $findings"
            echo "- Report: trivy-image-report.json"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$findings" != "0" ] && [ "$findings" != "unknown" ]; then
            echo "::warning title=Trivy::$findings image vulnerability finding(s) — see trivy-image-report artifact"
          else
            echo "::notice title=Trivy::Scan finished, report uploaded as artifact"
          fi

      - name: Upload Trivy Report
        if: always() # publish the report even when the scan flags vulnerabilities
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: trivy-image-report.json
          if-no-files-found: error # fail the step (and surface it) if the scan wrote no report
