name: Juice Shop CI/CD

on:
  push:
    branches:
      - master

env:
  IMAGE_NAME: nitinkdocker18/juice_shop
  IMAGE_TAG: juice-shop-1.1

jobs:
  cache:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Cache node_modules
        id: npm-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install Dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true' # only install when the lockfile changed
        run: npm ci

  test:
    needs: [cache]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Restore node_modules
        id: npm-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install Dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true' # fallback when cache missed
        run: npm ci

      - name: Run Tests
        run: npm test

  gitleaks:
    needs: [cache]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so Gitleaks can scan every commit, not just the latest

      - name: Run Gitleaks Secret Scan
        continue-on-error: true # report any leaks but don't fail the pipeline
        run: |
          docker run --rm -v "${{ github.workspace }}:/path" zricethezav/gitleaks:latest detect \
            --source="/path" \
            --report-format json \
            --report-path "/path/gitleaks-report.json" \
            --verbose

      - name: Upload Gitleaks Report
        if: always() # publish the report even when the scan step finds leaks
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          if-no-files-found: error # fail the step (and surface it) if the scan wrote no report

  njsscan:
    needs: [cache]
    runs-on: ubuntu-latest
    continue-on-error: true # job fails on findings but the pipeline keeps going

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Run njsscan SAST
        continue-on-error: true # surface findings but keep the job's later steps running
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" opensecurity/njsscan:latest \
            --sarif -o /src/njsscan-report.sarif --exit-warning /src

      - name: Upload njsscan Report
        if: always() # publish the report even when the scan flags findings
        uses: actions/upload-artifact@v4
        with:
          name: njsscan-report
          path: njsscan-report.sarif
          if-no-files-found: error # fail the step (and surface it) if the scan wrote no report

  semgrep:
    needs: [cache]
    runs-on: ubuntu-latest
    continue-on-error: true # job fails on findings but the pipeline keeps going
    container:
      image: semgrep/semgrep:latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Run Semgrep SAST
        continue-on-error: true # surface findings but keep the job's later steps running
        run: semgrep scan --config auto --json --output semgrep-report.json --error

      - name: Upload Semgrep Report
        if: always() # publish the report even when the scan flags findings
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep-report.json
          if-no-files-found: error # fail the step (and surface it) if the scan wrote no report

  retire:
    needs: [cache]
    runs-on: ubuntu-latest
    continue-on-error: true # job fails on findings but the pipeline keeps going

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Restore node_modules
        id: npm-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install Dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true' # fallback when cache missed
        run: npm ci

      - name: Run Retire.js SCA
        continue-on-error: true # surface vulnerable dependencies but keep later steps running
        run: |
          npm install -g retire
          retire --path . --outputformat json --outputpath retirejs-report.json --severity low

      - name: Upload Retire.js Report
        if: always() # publish the report even when the scan flags vulnerable dependencies
        uses: actions/upload-artifact@v4
        with:
          name: retirejs-report
          path: retirejs-report.json
          if-no-files-found: error # fail the step (and surface it) if the scan wrote no report

  upload_report:
    needs: [test, gitleaks, njsscan, semgrep, retire]
    runs-on: ubuntu-latest
    if: always() # still upload whatever reports were produced, even if a scan job failed

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download Scan Reports
        uses: actions/download-artifact@v4
        with:
          path: reports # each artifact lands in reports/<artifact-name>/

      - name: Install requests
        run: pip install requests

      - name: Import Reports into DefectDojo
        env:
          DEFECTDOJO_URL: ${{ secrets.DEFECTDOJO_URL }} # e.g. https://demo.defectdojo.org
          DEFECTDOJO_API_KEY: ${{ secrets.DEFECTDOJO_API_KEY }}
          DEFECTDOJO_ENGAGEMENT_ID: ${{ secrets.DEFECTDOJO_ENGAGEMENT_ID }}
        run: python uploads-python.py

  build:
    needs: [upload_report] # make sure the report is uploaded before we build/push the image, so the scan results are always available for triage even if the build fails
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  trivy:
    needs: [build] # scan the image only after it has been built and pushed
    runs-on: ubuntu-latest
    continue-on-error: true # job fails on findings but the pipeline keeps going

    steps:
      - name: Run Trivy Image Scan
        continue-on-error: true # surface image vulnerabilities but keep later steps running
        run: |
          docker run --rm -v "${{ github.workspace }}:/report" aquasec/trivy:latest image \
            --format json \
            --output /report/trivy-image-report.json \
            --severity CRITICAL,HIGH,MEDIUM,LOW \
            --vuln-type os,library \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Upload Trivy Report
        if: always() # publish the report even when the scan flags vulnerabilities
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: trivy-image-report.json
          if-no-files-found: error # fail the step (and surface it) if the scan wrote no report
