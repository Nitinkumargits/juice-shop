name: Juice Shop CI/CD

on:
  push:
    branches:
      - master

env:
  IMAGE_NAME: nitinkdocker18/juice_shop
  IMAGE_TAG: juice-shop-1.1

jobs:
  cache:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Cache node_modules
        id: npm-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install Dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true' # only install when the lockfile changed
        run: npm ci

  test:
    needs: [cache]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Restore node_modules
        id: npm-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install Dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true' # fallback when cache missed
        run: npm ci

      - name: Run Tests
        run: npm test

  gitleaks:
    needs: [test]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so Gitleaks can scan every commit, not just the latest

      - name: Run Gitleaks Secret Scan
        continue-on-error: true # report any leaks but don't fail the pipeline
        run: |
          docker run --rm -v "${{ github.workspace }}:/path" zricethezav/gitleaks:latest detect --source="/path" --verbose

  njsscan:
    needs: [gitleaks]
    runs-on: ubuntu-latest
    continue-on-error: true # job fails on findings but the pipeline keeps going

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Run njsscan SAST
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" opensecurity/njsscan:latest --exit-warning /src

  semgrep:
    needs: [njsscan]
    runs-on: ubuntu-latest
    continue-on-error: true # job fails on findings but the pipeline keeps going
    container:
      image: semgrep/semgrep:latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Run Semgrep SAST
        run: semgrep scan --config auto --error

  build:
    needs: [gitleaks, njsscan, semgrep]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
