name: Juice Shop CI/CD

on:
  push:
    branches:
      - master

env:
  IMAGE_NAME: nitinkdocker18/juice_shop
  IMAGE_TAG: juice-shop-1.1

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm test

  gitleaks:
    needs: [test]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so Gitleaks can scan every commit, not just the latest

      - name: Run Gitleaks Secret Scan
        continue-on-error: true # report any leaks but don't fail the pipeline
        run: |
          docker run --rm -v "${{ github.workspace }}:/path" zricethezav/gitleaks:latest detect --source="/path" --verbose

  njsscan:
    needs: [gitleaks]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Run njsscan SAST
        continue-on-error: true # report findings but don't fail the pipeline
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" opensecurity/njsscan:latest /src

  build:
    needs: [njsscan]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
